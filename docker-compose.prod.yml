# Production Docker Compose — Paper-Rock-Scissors
# Usage: docker compose -f docker-compose.prod.yml up --build -d
#
# Port map (loopback only — nginx on the host proxies everything via port 8091):
#   rps_redis_prod   →  127.0.0.1:6380:6379
#   rps_server_prod  →  127.0.0.1:3010:3010
#   rps_client_prod  →  127.0.0.1:3011:80

services:
  redis:
    image: redis:7-alpine
    container_name: rps_redis_prod
    ports:
      - "127.0.0.1:6380:6379"   # loopback only — 6379 is occupied by RealEstatesAPI
    restart: always
    networks:
      - rps_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  server:
    build:
      context: .
      dockerfile: packages/server/Dockerfile
      target: production
    container_name: rps_server_prod
    env_file:
      - .env.production
    ports:
      - "127.0.0.1:3010:3010"   # nginx proxies /socket.io/ to this — never directly exposed
    environment:
      - NODE_ENV=production
      - PORT=3010
      - REDIS_URL=redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    restart: always
    networks:
      - rps_network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3010/health', r => process.exit(r.statusCode < 400 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  client:
    build:
      context: .
      dockerfile: packages/client/Dockerfile
      target: production
      args:
        # Socket.IO connects to same public port — nginx proxies /socket.io/ to the server
        - VITE_SERVER_URL=http://46.224.231.217:8091
    container_name: rps_client_prod
    ports:
      - "127.0.0.1:3011:80"     # nginx proxies / to this — never directly exposed
    depends_on:
      server:
        condition: service_healthy
    restart: always
    networks:
      - rps_network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/ > /dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  rps_network:
    driver: bridge

server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    server_tokens off;

    # React SPA — all routes fall back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Vite hash-named bundles — cache forever
    location ~* \.[a-f0-9]{8,}\.(js|css|mjs)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # Static assets
    location ~* \.(ico|png|jpg|jpeg|svg|webp|woff2|woff|ttf|eot|gif)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        access_log off;
    }
}

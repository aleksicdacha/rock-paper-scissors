  <line x1="50" y1="52" x2="50" y2="56" stroke="#f59e0b" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="64" y1="52" x2="64" y2="56" stroke="#f59e0b" stroke-width="1.5" stroke-linecap="round"/>

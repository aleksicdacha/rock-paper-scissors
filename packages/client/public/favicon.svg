  <!-- Index finger -->
  <rect x="30" y="30" width="12" height="30" rx="6" fill="#fbbf24"/>
  <!-- Middle finger -->
  <rect x="44" y="26" width="12" height="32" rx="6" fill="#fbbf24"/>
  <!-- Ring finger -->

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="#1e293b" stroke="#6366f1" stroke-width="3"/>

  <!-- Rock fist -->
  <!-- Palm/base -->

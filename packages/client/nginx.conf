server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # React SPA — all unknown paths fall back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Vite hash-named JS/CSS bundles are immutable
    location ~* \.(js|css)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # Other static assets
    location ~* \.(png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf)$ {
        expires 6M;
        add_header Cache-Control "public, max-age=15552000";
        access_log off;
    }
}
